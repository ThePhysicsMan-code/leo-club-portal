<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leo Club Progress Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900">

    <header class="bg-[#003366] text-white p-6 shadow-lg text-center">
        <h1 class="text-3xl font-bold">LEO CLUB TRACKER</h1>
        <p class="text-[#f1c40f]">Alpha Secretary Dashboard</p>
    </header>

    <main class="max-w-4xl mx-auto p-6 space-y-10">

        <section class="bg-white p-6 rounded-xl shadow-md">
            <h2 class="text-2xl font-bold mb-4 border-b-2 border-[#f1c40f] inline-block">Set Individual Goal</h2>
            <div class="grid gap-4 mt-4">
                <input id="leoName" type="text" placeholder="Member Name" class="border p-2 rounded">
                <select id="leoType" class="border p-2 rounded">
                    <option value="Alpha">Alpha (12-18)</option>
                    <option value="Omega">Omega (18-30)</option>
                </select>
                <textarea id="goalText" placeholder="Describe your goal..." class="border p-2 rounded"></textarea>
                <button onclick="createGoal()" class="bg-[#003366] text-white py-2 rounded hover:bg-blue-800 transition">Save Goal</button>
            </div>
            <div id="goalList" class="mt-6 space-y-3"></div>
        </section>

        <section class="bg-white p-6 rounded-xl shadow-md">
            <h2 class="text-2xl font-bold mb-4 border-b-2 border-[#f1c40f] inline-block">Top Leo Event Feed</h2>
            <div id="eventFeed" class="space-y-4">
                </div>
        </section>

    </main>

    <script>
        // GOAL LOGIC
        function createGoal() {
            const name = document.getElementById('leoName').value;
            const type = document.getElementById('leoType').value;
            const goal = document.getElementById('goalText').value;

            if(!name || !goal) return alert("Fill all fields");

            const card = `
                <div class="p-4 border-l-4 border-[#f1c40f] bg-gray-50 rounded shadow-sm">
                    <p class="font-bold text-sm text-gray-500">${type} Member</p>
                    <h4 class="font-bold text-lg">${name}</h4>
                    <p class="italic text-gray-700">"${goal}"</p>
                    <div class="w-full bg-gray-200 h-2 mt-2 rounded">
                        <div class="bg-green-500 h-2 rounded" style="width: 10%"></div>
                    </div>
                </div>`;
            
            document.getElementById('goalList').insertAdjacentHTML('afterbegin', card);
        }

        // NEW DYNAMIC EVENT FEED LOGIC
async function loadEvents() {
    const sheetyUrl = 'YOUR_SHEETY_API_URL_HERE'; // PASTE YOUR URL HERE
    const feed = document.getElementById('eventFeed');
    
    try {
        const response = await fetch(sheetyUrl);
        const data = await response.json();
        const events = data.events; // Match this to your sheet tab name

        feed.innerHTML = ''; // Clear loading state

        events.forEach(e => {
            feed.innerHTML += `
                <div class="flex justify-between items-center p-4 border rounded hover:bg-yellow-50 transition shadow-sm bg-white">
                    <div>
                        <h4 class="font-bold text-[#003366] text-lg">${e.title}</h4>
                        <p class="text-sm text-gray-600">Organized by: <span class="font-medium">${e.host}</span></p>
                        <p class="text-xs text-gray-500 mt-1">${e.description || ''}</p>
                    </div>
                    <div class="text-right">
                        <span class="bg-[#f1c40f] px-3 py-1 rounded-full text-xs font-bold block mb-2 text-center">${e.date}</span>
                        <button class="text-[#003366] text-xs font-bold hover:underline">Details →</button>
                    </div>
                </div>`;
        });
    } catch (error) {
        feed.innerHTML = '<p class="text-red-500">Error loading events. Check API URL.</p>';
        console.error(error);
    }
}

// Run on page load
loadEvents();
